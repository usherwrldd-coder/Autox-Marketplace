name: autox_marketplace
description: Premium Auto Parts Marketplace — Escrow Protected
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Supabase
  supabase_flutter: ^2.3.4

  # UI & Animation
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0
  carousel_slider: ^4.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0

  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  image_picker: ^1.0.7
  flutter_dotenv: ^5.1.0
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  get_it: ^7.6.7
  injectable: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/